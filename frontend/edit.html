<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/edit.css">
    <title>Editar Exercicio</title>
</head>

<body>

    <body>
        <main class="main-content">
            <div class="card">
                <h2 id="exercise-name"></h2>

                <ul class="exercise-info" id="exercise-info">
                    <p id="exercise-id"></p>
                    <p id="exercise-muscle-group"></p>
                </ul>

                <div class="actions">
                    <button class="btn-delete btn-exercise" id="btn-delete">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                            fill="#EA3323">
                            <path
                                d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z" />
                        </svg>
                    </button>
                    <button class="btn-edit btn-exercise" id="btn-edit">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                            fill="#FFF">
                            <path
                                d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z" />
                        </svg>
                    </button>
                </div>

                <a href="index.html">Voltar</a>
            </div>
        </main>
        <dialog id="modal-form">
            <form action="" class="modal-form">
                <h3>Atualizar exercício</h3>
                    <label for="name-exercise">Novo nome: </label>
                    <input type="text" id="name-exercise">
                    <label for="muscle-group" class="form-label">Grupo Muscular:</label>
                    <select name="muscleGroup" id="muscle-group" class="form-input">
                        <option value="">Selecione...</option>
                        <option value="CHEST">Peito</option>
                        <option value="BACK">Costas</option>
                        <option value="SHOULDERS">Ombros</option>
                        <option value="ARMS">Braços</option>
                        <option value="CORE">Abdomen</option>
                        <option value="LEGS">Pernas</option>
                    </select>
            </form>
            <button id="save-update">Salvar</button>
            <button id="close-modal">Fechar</button>
        </dialog>
        <script type="module" src="js/main-edit.js"></script>
    </body>
</html>
